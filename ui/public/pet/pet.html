<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>桌面宠物</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #pet-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #pet-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: grab;
      image-rendering: auto;
      transition: transform 0.15s ease;
      pointer-events: auto;
    }

    #pet-img:active { cursor: grabbing; }
    #pet-img.bounce {
      animation: pet-bounce 0.4s ease;
    }

    @keyframes pet-bounce {
      0%   { transform: translateY(0) scale(1); }
      30%  { transform: translateY(-12px) scale(1.05); }
      50%  { transform: translateY(-14px) scale(1.08); }
      80%  { transform: translateY(2px) scale(0.97); }
      100% { transform: translateY(0) scale(1); }
    }

    @keyframes pet-shake {
      0%, 100% { transform: rotate(0deg); }
      20%  { transform: rotate(-8deg); }
      40%  { transform: rotate(8deg); }
      60%  { transform: rotate(-5deg); }
      80%  { transform: rotate(5deg); }
    }

    #pet-img.shake {
      animation: pet-shake 0.5s ease;
    }

    @keyframes pet-spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #pet-img.spin {
      animation: pet-spin 0.6s ease;
    }

    @keyframes pet-flash {
      0%, 100% { opacity: 1; }
      25%      { opacity: 0.2; }
      50%      { opacity: 1; }
      75%      { opacity: 0.2; }
    }

    #pet-img.flash {
      animation: pet-flash 0.5s ease;
    }

    /* 气泡消息 */
    #bubble {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 30, 30, 0.92);
      color: #fff;
      font-size: 12px;
      font-family: "Microsoft YaHei", sans-serif;
      padding: 4px 10px;
      border-radius: 10px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 100;
      max-width: 180px;
      text-align: center;
      line-height: 1.4;
    }

    #bubble.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    /* 右键菜单 */
    #context-menu {
      position: absolute;
      background: rgba(30, 30, 30, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      padding: 4px 0;
      min-width: 140px;
      z-index: 200;
      display: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    #context-menu.visible { display: block; }

    .menu-item {
      padding: 7px 14px;
      color: #ddd;
      font-size: 12px;
      font-family: "Microsoft YaHei", sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }

    .menu-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    .menu-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <div id="bubble"></div>
    <img id="pet-img" src="" draggable="false" alt="pet" />
    <div id="context-menu">
      <!-- 菜单项由 pet-engine.js 从配置动态渲染 -->
    </div>
  </div>

  <script src="pet-engine.js"></script>
</body>
</html>
